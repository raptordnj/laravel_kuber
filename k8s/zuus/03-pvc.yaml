  resources:
    requests:
      storage: 20Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: zuus
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
