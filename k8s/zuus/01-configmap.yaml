  PULSE_ENABLED: "true"
  PULSE_CACHE_DRIVER: "redis"
  PULSE_INGEST_DRIVER: "redis"
  PULSE_REDIS_CONNECTION: "default"

  MAIL_MAILER: "smtp"
  MAIL_HOST: "CHANGE_ME"
  MAIL_PORT: "587"
  MAIL_FROM_ADDRESS: "hello@example.com"
  MAIL_FROM_NAME: "Zuus"

  GOOGLE_RECAPTCHA_ENABLED: "false"

