  BROADCAST_CONNECTION: "log"
  FILESYSTEM_DISK: "local"
  QUEUE_CONNECTION: "redis"
  QUEUE_ENTERPRISE_CONNECTION: "redis"
  CACHE_STORE: "redis"

  REDIS_CLIENT: "phpredis"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  LOG_CHANNEL: "stack"
