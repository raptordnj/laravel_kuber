  CENTRAL_DOMAIN: "zuus.example.com"
  CUSTOMER_PANEL_DOMAIN: "my.example.com"
  ADMIN_PANEL_DOMAIN: "admin.example.com"

  DB_CONNECTION: "mysql"
  DB_HOST: "mariadb"
  DB_PORT: "3306"
