---
# MariaDB init script — creates the three databases and grants zuus user access
apiVersion: v1
kind: ConfigMap
metadata:
  name: mariadb-init
  namespace: zuus
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS `zuus_business`;
    CREATE DATABASE IF NOT EXISTS `tenant_central`;
    CREATE DATABASE IF NOT EXISTS `tenant_template`;
    GRANT ALL PRIVILEGES ON `zuus_business`.*    TO 'zuus'@'%';
    GRANT ALL PRIVILEGES ON `tenant_central`.*   TO 'zuus'@'%';
    GRANT ALL PRIVILEGES ON `tenant_template`.*  TO 'zuus'@'%';
    FLUSH PRIVILEGES;

---
# Nginx sidecar config for zuus-business pods
apiVersion: v1
kind: ConfigMap
metadata:
  name: business-nginx-config
  namespace: zuus
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        client_max_body_size 64m;

        root /shared/public;
        index index.php index.html;

        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            # SCRIPT_FILENAME points to PHP-FPM container's path
            fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT   /var/www/html/public;
            fastcgi_read_timeout 300;
        }

        location ~ /\.(?!well-known).* { deny all; }
    }

---
