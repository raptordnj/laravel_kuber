---
# Shared database credentials
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: zuus
type: Opaque
stringData:
  root-password: "CHANGE_ME_ROOT"
  password: "CHANGE_ME_ZUUS"

---
# zuus-business application secrets
apiVersion: v1
kind: Secret
metadata:
