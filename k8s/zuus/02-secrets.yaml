  namespace: zuus
type: Opaque
stringData:
  APP_KEY: "base64:CHANGE_ME_RUN_php_artisan_key_generate"
  CENTRAL_DB_PASSWORD: "CHANGE_ME_ZUUS"
  TENANT_TEMPLATE_DB_PASSWORD: "CHANGE_ME_ZUUS"
  REDIS_PASSWORD: "null"
  ZUUS_BUSINESS_STAFF_API_TOKEN: "CHANGE_ME"
