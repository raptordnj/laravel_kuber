  namespace: zuus
type: Opaque
stringData:
  APP_KEY: "base64:CHANGE_ME_RUN_php_artisan_key_generate"
  DB_PASSWORD: "CHANGE_ME_ZUUS"
  REDIS_PASSWORD: "null"

---
# zuus-commerce application secrets
apiVersion: v1
kind: Secret
metadata:
