apiVersion: v1
kind: Secret
metadata:
  name: claude-secrets
  namespace: claude
type: Opaque
stringData:
  # Your Anthropic API key — https://console.anthropic.com/settings/keys
  ANTHROPIC_API_KEY: "REPLACE_WITH_ANTHROPIC_API_KEY"
  # Bearer token the Laravel apps send in Authorization header
  # Generate: openssl rand -hex 32
  CLAUDE_SERVICE_TOKEN: "REPLACE_WITH_SERVICE_TOKEN"
