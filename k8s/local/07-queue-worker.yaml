apiVersion: apps/v1
kind: Deployment
metadata:
  name: laravel-queue-worker
  namespace: laravel-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: laravel-queue-worker
  template:
    metadata:
      labels:
        app: laravel-queue-worker
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mysql 3306; do echo waiting for mysql; sleep 2; done
              until nc -z redis 6379; do echo waiting for redis; sleep 2; done
              mkdir -p /var/www/html/storage/framework/cache
              mkdir -p /var/www/html/storage/framework/sessions
              mkdir -p /var/www/html/storage/framework/views
              mkdir -p /var/www/html/storage/logs
              mkdir -p /var/www/html/bootstrap/cache
              chown -R 33:33 /var/www/html/storage /var/www/html/bootstrap/cache
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage
            - name: cache
              mountPath: /var/www/html/bootstrap/cache
      containers:
        - name: worker
          image: laravel-local:20260610-1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: laravel-app-config
            - secretRef:
                name: laravel-app-secrets
          command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=90"]
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage
            - name: cache
              mountPath: /var/www/html/bootstrap/cache
      volumes:
        - name: storage
          emptyDir: {}
        - name: cache
          emptyDir: {}
